<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>
    <div class="container flex black-bg">

        <div class="left">

            <div class="close">
                <img width="30px" class="invert" src="images/close.svg" alt="">
            </div>

            <div class="home gray-bg round m1 p1">
                <div class="logo">
                    <img style="width: 200px;" class="invert" src="images/logo1.svg" alt="">
                </div>
                <ul>
                    <li><img class="invert" src="images/home.svg">Home</li>
                    <li><img class="invert" src="images/search.svg">Search</li>
                </ul>
            </div>

            <div class="library gray-bg round m1 p1">
                <div class="heading">
                    <img class="invert" src="images/playlist.svg">
                    <h2>Your Library</h2>
                </div>

                <div class="songlist">
                    <ul></ul>
                </div>
            </div>

            <div class="footer">
                <div><a href="#"><span>Legal</span></a></div>
                <div><a href="#"><span>Privacy</span></a></div>
                <div><a href="#"><span>Cookies</span></a></div>
            </div>
        </div>

        <div class="right gray-bg round">

            <div class="header round">
                <div class="nav">
                    <div class="hamburger_container">
                        <img class="invert hamburger" src="images/hamburger.svg">
                    </div>
                </div>

                <div class="buttons">
                    <button class="signup">Sign up</button>
                    <button class="login">Log in</button>
                </div>
            </div>

            <div class="playlists">
                <h2>Spotify Playlists</h2>
                <div class="cardcontainer"></div>
            </div>

            <div class="playbar">

                <div class="seekbar">
                    <div class="circle"></div>
                </div>

                <div class="abovebar">

                    <div class="songinfo"></div>

                    <div class="songbuttons">
                        <img width="30px" src="images/prevsong.svg">
                        <img width="30px" src="images/play.svg">
                        <img width="30px" src="images/nextsong.svg">
                    </div>

                    <div class="timevolume">
                        <div class="songtime"></div>

                        <div class="volume">
                            <img width="25px" class="invert" src="images/volume.svg">
                            <input type="range" class="range" min="0" max="100" value="50">
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
